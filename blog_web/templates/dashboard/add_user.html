{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    {% comment %} left sidebar {% endcomment %}
    {% include 'dashboard/sidebar.html' %}

    
    {% comment %} right sidebar {% endcomment %}
    <div class="col-md-9">
        <h4>Add New User</h4>
        <form action="{% url 'add_user' %}" method="post" style="width: 650px;">
            {% csrf_token %}
            {{form | crispy}}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>

</div>

{% endblock %}
